<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Run The World — Connect Strava</title>
    <style>
      body {
        font-family:
          system-ui,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        background: #f7fafc;
      }
      .card {
        background: #fff;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 90%;
        text-align: center;
      }
      .btn {
        display: inline-block;
        padding: 12px 18px;
        background: #fc4c02;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Run The World</h1>
      <p>Connect your Strava account to get started.</p>
      <a id="connect" class="btn">Connect with Strava</a>
      <p class="muted">
        This is an MVP demo — only OAuth and token storage are implemented.
      </p>
    </div>
    <script>
      document.getElementById("connect").addEventListener("click", () => {
        // Redirect the browser to the backend's /auth/strava endpoint
        // Assuming API is hosted under same domain or set CORS accordingly
        window.location.href = "/auth/strava";
      });
    </script>
  </body>
</html>
